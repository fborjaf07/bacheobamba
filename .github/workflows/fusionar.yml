name: Fusionar reportes de baches

on:
  push:
    branches:
      - main

jobs:
  fusionar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Fusionar queue
        run: |
          python3 -c "
          import json, os, glob, datetime
          archivos = glob.glob('queue/*.json')
          if not archivos:
              print('Sin archivos en queue/')
              exit(0)
          with open('baches-data.json') as f:
              data = json.load(f)
          mapa = {b['id']: b for b in data.get('baches', [])}
          for archivo in sorted(archivos):
              try:
                  with open(archivo) as f:
                      item = json.load(f)
                  rid = item.get('id')
                  if not rid: continue
                  accion = item.get('_accion', 'upsert')
                  limpio = {k:v for k,v in item.items() if not k.startswith('_')}
                  if accion == 'eliminar':
                      mapa.pop(rid, None)
                  elif rid in mapa:
                      ex = mapa[rid]
                      if ex.get('estado') == 'atendido': limpio['estado'] = 'atendido'
                      mapa[rid] = {**ex, **limpio}
                  else:
                      mapa[rid] = limpio
              except Exception as e:
                  print(f'Error {archivo}: {e}')
          data['baches'] = list(mapa.values())
          data['actualizacion'] = datetime.datetime.utcnow().isoformat() + 'Z'
          with open('baches-data.json', 'w') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          for a in archivos: os.remove(a)
          print(f'OK: {len(data[\"baches\"])} baches')
          "

      - name: Commit
        run: |
          git config user.name "BACHEOBAMBA Bot"
          git config user.email "bot@bacheobamba.gadmr"
          git add baches-data.json
          git rm -r --cached queue/ 2>/dev/null || true
          git diff --staged --quiet && echo "Sin cambios" || (git commit -m "BACHEOBAMBA: fusion [skip ci]" && git push)
