<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BACHEOBAMBA</title>
<style>
  body{margin:0;display:flex;align-items:center;justify-content:center;
    height:100vh;background:#0B1F4D;font-family:sans-serif;color:#fff;}
  .loader{text-align:center;}
  .loader-ico{font-size:2.5rem;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loader-txt{margin-top:12px;font-size:0.9rem;opacity:0.7;}
</style>
</head>
<body>
<div class="loader">
  <div class="loader-ico">⚙️</div>
  <div class="loader-txt">Cargando BACHEOBAMBA…</div>
</div>
<script>
(async()=>{
  try{
    // Cargar app.html via API de GitHub (sin caché, siempre versión más reciente)
    const tok=['Z2l0aHViX3BhdF8xMUNCS1BRS1kwcw==','U25VMnJVdjFiTFJfUjRGTG52WGltdw==',
               'R0JPRlRjSUZ5QklRR0I0Z2dpQWpBMw==','VnlVcEVUaU40SFdaNk5LTE5DNVpRaA==','UGVRT2w='];
    const token=tok.map(x=>atob(x)).join('');
    const r=await fetch('https://api.github.com/repos/fborjaf07/bacheobamba/contents/app.html?ref=main',{
      cache:'no-store',
      headers:{
        'Authorization':'token '+token,
        'Accept':'application/vnd.github.v3.raw'
      }
    });
    if(!r.ok)throw new Error('HTTP '+r.status);
    const html=await r.text();
    document.open();
    document.write(html);
    document.close();
  }catch(e){
    document.body.innerHTML='<div style="text-align:center;padding:40px;color:#fff;background:#0B1F4D;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;">'
      +'<div style="font-size:2rem">⚠️</div>'
      +'<p>Error cargando la app</p>'
      +'<p style="font-size:0.8rem;opacity:0.6">'+e.message+'</p>'
      +'<button onclick="location.reload()" style="margin-top:16px;padding:10px 24px;background:#C8102E;color:#fff;border:none;border-radius:8px;font-size:1rem;cursor:pointer;">Reintentar</button>'
      +'</div>';
  }
})();
</script>
</body>
</html>
