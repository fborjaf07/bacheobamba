document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

F4D; --tx-m:#4A536B; --tx-c:#7A8299;\n  --r:14px; --rs:10px; --r-pill:999px;\n  --sh-1:0 1px 2px rgba(20,30,55,.04), 0 1px 3px rgba(20,30,55,.05);\n  --sh-2:0 4px 14px rgba(20,30,55,.06), 0 2px 6px rgba(20,30,55,.04);\n  --sh-3:0 12px 36px rgba(20,30,55,.12), 0 4px 14px rgba(20,30,55,.06);\n}\n*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}\nhtml,body{font-family:'Montserrat',system-ui,sans-serif;background:var(--fondo);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased;}\nbody{overflow-x:hidden;font-weight:400;}\nbutton,input,select,textarea{font-family:inherit;color:inherit;}\n\n/* ── ICONOS ── */\n.ico{display:inline-flex;align-items:center;justify-content:center;}\n.ico svg{width:1em;height:1em;}\n\n/* ── FRANJA SUPERIOR (mensajes municipales) ── */\n.top-bar{background:var(--rojo);color:#fff;font-size:.7rem;font-weight:700;\n  letter-spacing:.18em;text-transform:uppercase;overflow:hidden;position:relative;\n  display:flex;align-items:center;height:30px;border-bottom:2px solid var(--azul);}\n.top-track{display:flex;gap:48px;white-space:nowrap;animation:tickr 28s linear infinite;padding-left:100%;}\n.top-track span{display:inline-flex;align-items:center;gap:14px;}\n.top-track span::before{content:\"\";width:6px;height:6px;border-radius:50%;background:#fff;display:inline-block;}\n@keyframes tickr{0%{transform:translateX(0);}100%{transform:translateX(-100%);}}\n\n/* ── HEADER ── */\n.hdr{background:var(--azul);border-bottom:4px solid var(--rojo);height:96px;display:grid;\n  grid-template-columns:auto 1fr auto;align-items:center;gap:14px;padding:0 18px;position:sticky;top:0;z-index:200;}\n.hdr-brand{display:flex;align-items:center;justify-self:start;}\n.logo-mark{width:72px;height:72px;border-radius:12px;display:block;background:#fff;padding:4px;\n  box-shadow:0 4px 14px rgba(0,0,0,.22);}\n.hdr-title{justify-self:center;text-align:center;line-height:1;}\n.hdr-title h1{font-size:1.85rem;font-weight:800;letter-spacing:0.06em;color:#fff;\n  text-transform:uppercase;white-space:nowrap;}\n.hdr-title h1 em{font-style:normal;color:#fff;background:var(--rojo);padding:2px 10px;border-radius:6px;}\n.hdr-title small{display:block;font-size:0.6rem;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;\n  color:rgba(255,255,255,.78);margin-top:6px;}\n.btn-adm-hdr{background:var(--rojo);border:2px solid #fff;color:#fff;width:48px;height:48px;\n  border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;\n  justify-self:end;transition:all .15s;padding:0;font-size:1.15rem;\n  box-shadow:0 4px 14px rgba(200,16,46,.45);}\n.btn-adm-hdr:hover{background:var(--rojo-h);transform:scale(1.05);}\n.btn-adm-hdr span{display:none;}\n.btn-adm-hdr .ico{font-size:1.1rem;}\n@media(max-width:520px){\n  .hdr{height:86px;padding:0 14px;gap:10px;}\n  .logo-mark{width:60px;height:60px;}\n  .hdr-title h1{font-size:1.3rem;letter-spacing:0.04em;}\n  .hdr-title small{font-size:0.52rem;letter-spacing:0.16em;margin-top:4px;}\n  .btn-adm-hdr{width:42px;height:42px;}\n}\n@media(max-width:380px){\n  .hdr-title h1{font-size:1.1rem;}\n  .hdr-title small{display:none;}\n}\n\n/* ── HERO ── */\n.hero{padding:42px 20px 36px;background:var(--azul);position:relative;overflow:hidden;color:#fff;}\n.hero::before{content:\"\";position:absolute;top:-60px;right:-80px;width:300px;height:300px;\n  background:radial-gradient(circle at center, rgba(200,16,46,.35) 0%, transparent 70%);pointer-events:none;}\n.hero::after{content:\"\";position:absolute;bottom:0;left:0;right:0;height:6px;\n  background:linear-gradient(90deg, var(--rojo) 0%, var(--rojo) 50%, #fff 50%, #fff 100%);}\n.hero-wrap{max-width:900px;margin:0 auto;position:relative;z-index:1;}\n.hero-eyebrow{display:inline-flex;align-items:center;gap:9px;font-size:0.68rem;font-weight:800;\n  letter-spacing:0.18em;text-transform:uppercase;color:#fff;margin-bottom:18px;\n  background:var(--rojo);padding:7px 14px;border-radius:var(--r-pill);box-shadow:0 4px 14px rgba(200,16,46,.45);}\n.hero-eyebrow::before{content:\"\";display:inline-block;width:6px;height:6px;border-radius:50%;background:#fff;}\n.hero h2{font-size:2.15rem;font-weight:800;line-height:1.05;color:#fff;letter-spacing:-0.02em;margin-bottom:14px;text-wrap:balance;}\n.hero h2 em{font-style:normal;color:#FFD3D8;}\n.hero p{font-size:0.94rem;color:rgba(255,255,255,.82);font-weight:500;line-height:1.55;max-width:540px;margin-bottom:24px;}\n.btn-reportar{background:var(--rojo);color:#fff;border:2px solid #fff;padding:14px 28px;border-radius:var(--r-pill);\n  font-size:0.95rem;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;gap:8px;letter-spacing:.02em;\n  box-shadow:0 8px 24px rgba(0,0,0,.28);transition:all .2s;}\n.btn-reportar:hover{background:var(--rojo-h);transform:translateY(-1px);}\n.btn-reportar .ico{font-size:1.1rem;}\n.btn-reportar{background:var(--rojo);color:#fff;border:none;padding:14px 26px;border-radius:var(--r-pill);\n  font-size:0.92rem;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:8px;\n  box-shadow:0 8px 22px rgba(192,35,42,.28);transition:all .2s;}\n.btn-reportar:hover{background:var(--rojo-h);transform:translateY(-1px);box-shadow:0 12px 28px rgba(192,35,42,.34);}\n.btn-reportar .ico{font-size:1.1rem;}\n\n/* ── BANNER INFERIOR (construcción) ── */\n.bot-banner{background:var(--azul);color:#fff;padding:18px 16px;display:flex;align-items:center;gap:14px;\n  max-width:900px;margin:0 auto;border-radius:var(--r);box-shadow:0 8px 24px rgba(11,31,77,.18);\n  position:relative;overflow:hidden;}\n.bot-banner::before{content:\"\";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--rojo);}\n.bot-banner::after{content:\"\";position:absolute;right:-40px;top:-40px;width:140px;height:140px;\n  background:radial-gradient(circle, rgba(200,16,46,.22) 0%, transparent 70%);pointer-events:none;}\n.bot-icono{width:44px;height:44px;border-radius:12px;background:var(--rojo);color:#fff;\n  display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;\n  box-shadow:0 4px 12px rgba(200,16,46,.4);}\n.bot-txt{flex:1;min-width:0;position:relative;z-index:1;}\n.bot-txt h4{font-size:.92rem;font-weight:800;letter-spacing:.01em;margin-bottom:2px;}\n.bot-txt h4 em{font-style:normal;color:#fff;background:var(--rojo);padding:2px 8px;border-radius:6px;font-size:.78rem;margin-right:8px;letter-spacing:.1em;text-transform:uppercase;font-weight:800;vertical-align:2px;}\n.bot-txt p{font-size:0.78rem;color:rgba(255,255,255,.78);line-height:1.45;font-weight:500;}\n.bot-dot{width:10px;height:10px;border-radius:50%;background:#FFF;flex-shrink:0;\n  box-shadow:0 0 0 4px rgba(255,255,255,.2);animation:pulse 1.8s ease-in-out infinite;}\n@keyframes pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.3);opacity:.65;}}\n.bot-wrap{padding:24px 14px 0;margin-bottom:24px;}\n\n/* ── MAIN ── */\n.main{max-width:900px;margin:0 auto;padding:22px 14px 90px;}\n.main p,.main li{text-align:justify;hyphens:auto;}\n\n/* ── STATS ── */\n.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:26px;}\n.stat{background:#fff;border:2px solid var(--linea);border-radius:var(--r);padding:16px 12px;text-align:left;\n  display:flex;flex-direction:column;gap:6px;transition:border-color .15s;}\n.stat.tot{border-color:var(--azul);}\n.stat.pen{border-color:var(--rojo);}\n.stat.ate{border-color:var(--verde);}\n.stat-l{font-size:0.62rem;color:var(--tx-c);font-weight:700;text-transform:uppercase;letter-spacing:0.1em;}\n.stat-n{font-size:1.85rem;font-weight:800;line-height:1;letter-spacing:-0.02em;}\n.stat.tot .stat-n{color:var(--azul);}\n.stat.pen .stat-n{color:var(--rojo);}\n.stat.ate .stat-n{color:var(--verde);}\n.stat-bar{height:3px;border-radius:999px;background:var(--linea-f);overflow:hidden;}\n.stat-bar i{display:block;height:100%;width:100%;}\n.stat.tot .stat-bar i{background:var(--azul);}\n.stat.pen .stat-bar i{background:var(--rojo);}\n.stat.ate .stat-bar i{background:var(--verde);}\n\n/* ── SECCIÓN LABEL ── */\n.sec{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.14em;color:var(--azul);\n  margin-bottom:11px;display:flex;align-items:center;gap:9px;}\n.sec .ico{color:var(--rojo);font-size:0.95rem;}\n.sec::after{content:\"\";flex:1;height:1px;background:var(--linea);}\n\n/* ── MAPA ── */\n.mapa-wrap{border-radius:var(--r);overflow:hidden;border:1px solid var(--linea);background:#fff;margin-bottom:24px;box-shadow:var(--sh-1);}\n#mapa-ciu{height:300px;}\n.mapa-leyenda{display:flex;gap:18px;flex-wrap:wrap;align-items:center;padding:10px 14px;\n  border-top:1px solid var(--linea-f);background:#FAFBFD;}\n.mapa-leyenda-tit{font-size:.62rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--tx-c);margin-right:4px;}\n.mapa-ley-item{display:flex;align-items:center;gap:7px;font-size:.75rem;font-weight:600;color:var(--tx);}\n.mapa-ley-dot{width:14px;height:14px;border-radius:50%;border:2.5px solid #fff;box-shadow:0 0 0 1.5px var(--linea),0 1px 3px rgba(0,0,0,.18);flex-shrink:0;}\n.mapa-ley-dot.pen{background:var(--rojo);box-shadow:0 0 0 1.5px var(--rojo-d),0 1px 3px rgba(200,16,46,.35);}\n.mapa-ley-dot.ate{background:var(--azul);box-shadow:0 0 0 1.5px var(--azul-h),0 1px 3px rgba(11,31,77,.35);}\n\n/* ── CRONOGRAMA ── */\n.cron-card{background:#fff;border:1px solid var(--linea);border-radius:var(--r);overflow:hidden;margin-bottom:24px;box-shadow:var(--sh-1);}\n.cron-hdr{padding:14px 16px;border-bottom:1px solid var(--linea-f);background:linear-gradient(180deg,#fff,#F6F8FC);}\n.cron-hdr h3{font-size:0.95rem;font-weight:700;color:var(--azul);display:flex;align-items:center;gap:8px;}\n.cron-hdr p{font-size:0.74rem;color:var(--tx-m);margin-top:3px;}\n.cron-leyenda{display:flex;gap:14px;flex-wrap:wrap;align-items:center;padding:9px 16px;\n  background:#FAFBFD;border-bottom:1px solid var(--linea-f);}\n.cron-leyenda-tit{font-size:.6rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--tx-c);}\n.cron-ley-item{display:inline-flex;align-items:center;gap:7px;font-size:.7rem;font-weight:700;color:var(--tx);}\n.cron-ley-chip{padding:3px 9px;border-radius:var(--r-pill);font-size:.6rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;border:1.5px solid;}\n.cron-ley-chip.prog{background:#fff;color:var(--azul);border-color:var(--azul);}\n.cron-ley-chip.exec{background:#fff;color:var(--rojo);border-style:dashed;border-color:var(--rojo);}\n.cron-ley-chip.done{background:#fff;color:var(--rojo);border-color:var(--rojo);}\n.cron-body .cron-vacio{padding:24px 18px;text-align:center;color:var(--tx-c);font-size:0.83rem;}\n.cron-item{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(--linea-f);}\n.cron-item:last-child{border-bottom:none;}\n.cron-f{min-width:52px;text-align:center;padding:8px 4px;border-radius:10px;background:#fff;flex-shrink:0;border:2px solid var(--azul);}\n.cron-f .d{font-size:1.4rem;font-weight:800;line-height:1;color:var(--azul);letter-spacing:-0.02em;}\n.cron-f .m{font-size:0.58rem;text-transform:uppercase;color:var(--azul);letter-spacing:0.1em;font-weight:800;margin-top:2px;}\n.cron-item.done .cron-f{background:#fff;border-color:var(--rojo);}\n.cron-item.done .cron-f .d,.cron-item.done .cron-f .m{color:var(--rojo);}\n.cron-item.exec .cron-f{background:#fff;border-color:var(--rojo);border-style:dashed;}\n.cron-item.exec .cron-f .d,.cron-item.exec .cron-f .m{color:var(--rojo);}\n.cron-info{flex:1;min-width:0;}\n.cron-info h4{font-size:0.86rem;font-weight:700;color:var(--azul);margin-bottom:2px;text-align:left;}\n.cron-info p{font-size:0.74rem;color:var(--tx-m);line-height:1.45;text-align:justify;}\n.cron-bdg{margin-left:auto;flex-shrink:0;padding:4px 11px;border-radius:var(--r-pill);font-size:0.66rem;font-weight:800;text-transform:uppercase;letter-spacing:0.05em;}\n.cron-bdg.prog{background:#fff;color:var(--azul);border:1.5px solid var(--azul);}\n.cron-bdg.exec ze:0.9rem;color:var(--tx-m);transition:all .12s;}\n.m-close:hover{background:var(--linea);color:var(--tx);}\n.err{color:var(--rojo);font-size:0.78rem;margin-top:6px;display:none;font-weight:600;}\n.err.on{display:block;}\n.campo{margin-bottom:13px;}\n.campo label{display:block;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--azul);margin-bottom:6px;}\n.campo input,.campo select,.campo textarea{width:100%;padding:11px 13px;border:1.4px solid var(--linea);border-radius:var(--rs);font-size:0.88rem;background:#fff;transition:border-color .15s;}\n.campo input:focus,.campo select:focus,.campo textarea:focus{outline:none;border-color:var(--azul-c);}\n\n/* ── PANEL TÉCNICO ── */\n.panel{position:fixed;inset:0;background:var(--fondo);z-index:400;display:none;flex-direction:column;}\n.panel.on{display:flex;}\n.p-hdr{background:var(--azul);color:#fff;height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;}\n.p-hdr h2{font-size:1rem;font-weight:700;display:flex;align-items:center;gap:8px;letter-spacing:0.01em;}\n.p-hdr .logo-mark{width:38px;height:38px;}\n.usr-chip{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);\n  border-radius:var(--r-pill);padding:5px 11px;font-size:0.74rem;display:flex;align-items:center;gap:6px;font-weight:600;}\n.usr-chip .ico{font-size:0.9rem;opacity:.7;}\n.btn-salir{background:rgba(192,35,42,0.25);border:1px solid rgba(192,35,42,0.4);color:#FFCDCF;padding:6px 12px;border-radius:8px;\n  font-size:0.76rem;font-weight:600;cursor:pointer;transition:all .12s;}\n.btn-salir:hover{background:rgba(192,35,42,0.5);color:#fff;}\n\n.tabs{background:#fff;display:flex;border-bottom:1px solid var(--linea);overflow-x:auto;scrollbar-width:none;flex-shrink:0;padding:0 6px;}\n.tabs::-webkit-scrollbar{display:none;}\n.tab{padding:14px 13px;background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-1px;color:var(--tx-m);\n  font-size:0.78rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .13s;display:flex;align-items:center;gap:6px;}\n.tab:hover{color:var(--azul);}\n.tab.on{color:var(--rojo);border-bottom-color:var(--rojo);}\n.tab .ico{font-size:0.92rem;}\n.tab-bdg{background:var(--rojo);color:#fff;border-radius:var(--r-pill);padding:1px 7px;font-size:0.6rem;font-weight:700;}\n.tc{display:none;flex:1;overflow-y:auto;padding:16px;}\n.tc.on{display:block;}\n\n/* TARJETAS TÉCNICO */\n.tec-card{background:#fff;border:1px solid var(--linea);border-radius:var(--r);overflow:hidden;margin-bottom:9px;transition:border-color .15s;box-shadow:var(--sh-1);}\n.tec-card:hover{border-color:#dcd9d2;}\n.tec-body{padding:13px 15px;display:flex;gap:11px;align-items:center;}\n.tec-dir{font-weight:700;font-size:0.88rem;color:var(--azul);margin-bottom:3px;}\n.tec-meta{font-size:0.73rem;color:var(--tx-m);line-height:1.55;}\n.tec-acc{display:flex;gap:6px;align-items:center;flex-shrink:0;}\n.tec-tipo{display:inline-block;background:var(--rojo-s);color:var(--rojo);border-radius:6px;padding:3px 9px;font-size:0.64rem;font-weight:700;\n  text-transform:uppercase;letter-spacing:0.05em;margin-bottom:5px;}\n.tec-tipo.done{background:var(--verde-s);color:var(--verde);}\n\n/* ANTES/DESPUÉS */\n.ad-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}\n.ad-grid img{width:100%;border-radius:9px;cursor:pointer;}\n.ad-lbl{font-size:0.66rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;text-align:center;margin-bottom:5px;}\n.ad-lbl.a{color:var(--rojo);} .ad-lbl.d{color:var(--verde);}\n.det-head{background:var(--hueso);border-radius:var(--rs);padding:13px;margin-bottom:14px;}\n.det-head strong{display:block;font-size:0.95rem;color:var(--azul);margin-top:4px;}\n.det-meta{font-size:0.74rem;color:var(--tx-m);margin-top:3px;}\n.det-obs{margin-top:14px;background:var(--verde-s);border-radius:var(--rs);padding:12px;font-size:0.85rem;color:var(--azul);line-height:1.5;}\n.det-obs strong{color:var(--verde);}\n\n/* ADMIN */\n.adm-sec{margin-bottom:24px;}\n.adm-sec h3{font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--azul);margin-bottom:12px;display:flex;align-items:center;gap:8px;}\n.adm-sec h3 .ico{color:var(--rojo);font-size:1rem;}\n.usr-row{background:#fff;border:1px solid var(--linea);border-radius:var(--rs);padding:11px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}\n.usr-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--azul),var(--azul-c));\n  color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;flex-shrink:0;}\n.usr-name{font-weight:700;font-size:0.88rem;color:var(--azul);}\n.usr-rol{font-size:0.72rem;color:var(--tx-m);margin-top:1px;}\n\n.sync-bar{background:var(--azul);color:#fff;border-radius:var(--rs);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;font-size:0.82rem;}\n.sdot{width:8px;height:8px;border-radius:50%;background:var(--ambar);animation:pulse 1.5s ease-in-out infinite;}\n.sdot.ok{background:#4ADE80;animation:none;}\n.sdot.err{background:var(--rojo);animation:none;}\n\n.adm-stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;background:#fff;border:1px solid var(--linea);border-radius:var(--r);padding:14px;}\n.adm-stats-grid > div{display:flex;flex-direction:column;gap:2px;font-size:0.72rem;color:var(--tx-m);}\n.adm-stats-grid strong{font-size:1.4rem;font-weight:800;color:var(--tx);letter-spacing:-0.02em;}\n.adm-stats-grid strong.azul{color:var(--azul);}\n.adm-stats-grid strong.rojo{color:var(--rojo);}\n.adm-stats-grid strong.verde{color:var(--verde);}\n\n/* NOTIF */\n.notif{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--azul);color:#fff;padding:11px 22px;\n  border-radius:var(--r-pill);font-size:0.82rem;font-weight:600;z-index:9999;opacity:0;transition:all .28s;pointer-events:none;\n  white-space:nowrap;box-shadow:var(--sh-3);max-width:90vw;overflow:hidden;text-overflow:ellipsis;}\n.notif.on{opacity:1;transform:translateX(-50%) translateY(0);}\n.notif.v{background:var(--verde);} .notif.r{background:var(--rojo);}\n\n/* FOTO VIEWER */\n.fv{position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:9998;display:none;align-items:center;justify-content:center;flex-direction:column;gap:10px;}\n.fv.on{display:flex;}\n.fv img{max-width:95vw;max-height:80vh;border-radius:10px;object-fit:contain;}\n.fv-lbl{color:rgba(255,255,255,0.6);font-size:0.78rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;}\n\n.ses-av{position:fixed;top:74px;right:14px;background:var(--ambar-s);border:1px solid var(--ambar);border-radius:10px;padding:8px 14px;font-size:0.76rem;font-weight:600;color:#9E6A00;z-index:999;display:none;box-shadow:var(--sh-2);}\n.ses-av.on{display:block;}\n\n#mapa-tec{height:calc(100vh - 165px);border-radius:var(--r);overflow:hidden;border:1px solid var(--linea);}\n\n.leaflet-pane{z-index:1!important;}\n.leaflet-top,.leaflet-bottom{z-index:2!important;}\n.leaflet-control{z-index:2!important;font-family:'Montserrat',sans-serif!important;}\n.leaflet-popup-content-wrapper{border-radius:10px!important;}\n.panel{z-index:400;} .ov{z-index:500;} .wiz-full{z-index:600;} .fv{z-index:9998;} .notif{z-index:9999;}\n\n@media(max-width:520px){\n  .stats{grid-template-columns:repeat(3,1fr);gap:8px;}\n  .stat{padding:14px 10px;}\n  .stat-n{font-size:1.6rem;}\n  .stat-l{font-size:0.58rem;}\n  .cron-leyenda{gap:8px;padding:9px 12px;}\n  .cron-ley-chip{font-size:.55rem;padding:3px 8px;}\n  .cron-item{padding:12px 12px;gap:11px;}\n  .cron-bdg{font-size:.6rem;padding:3px 8px;}\n  .confianza{grid-template-columns:1fr;}\n  .conf-cel{min-height:auto;padding:20px 18px;}\n  .cierre-frase-tit{font-size:1.3rem;}\n  .cierre-firma-tx{font-size:.7rem;letter-spacing:.18em;}\n  .mapa-leyenda{gap:14px;padding:10px 12px;}\n  .mapa-ley-item{font-size:.7rem;}\n}\n@media(max-width:400px){\n  .hero h2{font-size:1.7rem;}\n  .stat-n{font-size:1.55rem;}\n  .tab{padding:12px 10px;font-size:0.74rem;}\n  .hdr-tit small{display:none;}\n  .adm-stats-grid{grid-template-columns:repeat(2,1fr);}\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"notif\" id=\"notif\"><\u002Fdiv>\n<div class=\"ses-av\" id=\"ses-av\">Tu sesión expira en 5 min<\u002Fdiv>\n<div class=\"fv\" id=\"fv\" onclick=\"this.classList.remove('on')\">\n  <img id=\"fv-img\" alt=\"\">\n  <div class=\"fv-lbl\" id=\"fv-lbl\"><\u002Fdiv>\n  <div style=\"color:rgba(255,255,255,0.35);font-size:0.7rem;\">Toca para cerrar<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- HEADER -->\n<header class=\"hdr\">\n  <div class=\"hdr-brand\">\n    <img class=\"logo-mark\" src=\"10f151b8-dbbc-463d-ad8e-7a228f440bad\" alt=\"Alcaldía de la Gente · Riobamba\">\n  <\u002Fdiv>\n  <div class=\"hdr-title\">\n    <h1>Bacheo<em>bamba<\u002Fem><\u002Fh1>\n    <small>Alcaldía de la Gente · Riobamba<\u002Fsmall>\n  <\u002Fdiv>\n  <button class=\"btn-adm-hdr\" onclick=\"abrirLogin()\" data-ico=\"lock\" aria-label=\"Acceso técnico\" title=\"Acceso técnico\"><span>Acceso técnico<\u002Fspan><\u002Fbutton>\n<\u002Fheader>\n\n<!-- HERO -->\n<section class=\"hero\">\n  <div class=\"hero-wrap\">\n    <div class=\"hero-eyebrow\">GADM Riobamba · Obras Públicas<\u002Fdiv>\n    <h2><em>Reporta el bache,<\u002Fem><br>nosotros lo atendemos.<\u002Fh2>\n    <button class=\"btn-reportar\" onclick=\"abrirWizard('ciudadano')\" data-ico=\"plus\">Reportar un bache<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- BANNER INFERIOR -->\n<div class=\"bot-wrap\">\n  <div class=\"bot-banner\">\n    <div class=\"bot-icono\" data-ico=\"cog\"><\u002Fdiv>\n    <div class=\"bot-txt\">\n      <h4><em>En obra<\u002Fem>Riobamba en construcción<\u002Fh4>\n      <p>Estamos trabajando en tu ciudad — las cuadrillas avanzan por sectores y pronto llegaremos al tuyo.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"bot-dot\" aria-hidden=\"true\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<main class=\"main\">\n  <div class=\"stats\">\n    <div class=\"stat tot\"><div class=\"stat-l\">Total<\u002Fdiv><div class=\"stat-n\" id=\"sn-tot\">—<\u002Fdiv><div class=\"stat-bar\"><i><\u002Fi><\u002Fdiv><\u002Fdiv>\n    <div class=\"stat pen\"><div class=\"stat-l\">Pendientes<\u002Fdiv><div class=\"stat-n\" id=\"sn-pen\">—<\u002Fdiv><div class=\"stat-bar\"><i><\u002Fi><\u002Fdiv><\u002Fdiv>\n    <div class=\"stat ate\"><div class=\"stat-l\">Atendidos<\u002Fdiv><div class=\"stat-n\" id=\"sn-ate\">—<\u002Fdiv><div class=\"stat-bar\"><i><\u002Fi><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"sec\"><span class=\"ico\" data-ico-static=\"map\"><\u002Fspan>Mapa de reportes<\u002Fdiv>\n  <div class=\"mapa-wrap\">\n    <div id=\"mapa-ciu\"><\u002Fdiv>\n    <div class=\"mapa-leyenda\" aria-label=\"Leyenda del mapa\">\n      <span class=\"mapa-leyenda-tit\">Leyenda<\u002Fspan>\n      <span class=\"mapa-ley-item\"><span class=\"mapa-ley-dot pen\"><\u002Fspan>Bache pendiente<\u002Fspan>\n      <span class=\"mapa-ley-item\"><span class=\"mapa-ley-dot ate\"><\u002Fspan>Bache atendido<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"sec\"><span class=\"ico\" data-ico-static=\"cal\"><\u002Fspan>Cronograma de intervenciones<\u002Fdiv>\n  <div class=\"cron-card\">\n    <div class=\"cron-hdr\">\n      <h3>Conoce dónde estamos trabajando<\u002Fh3>\n      <p>Programación pública de las cuadrillas de Obras Públicas.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"cron-leyenda\" aria-label=\"Leyenda del cronograma\">\n      <span class=\"cron-leyenda-tit\">Estados<\u002Fspan>\n      <span class=\"cron-ley-item\"><span class=\"cron-ley-chip prog\">Azul · Por atender<\u002Fspan><\u002Fspan>\n      <span class=\"cron-ley-item\"><span class=\"cron-ley-chip done\">Rojo · Atendido<\u002Fspan><\u002Fspan>\n      <span class=\"cron-ley-item\"><span class=\"cron-ley-chip exec\">En curso<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"cron-body\" id=\"cron-ciu\"><div class=\"cron-vacio\">Cargando…<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"sec\"><span class=\"ico\" data-ico-static=\"list\"><\u002Fspan>Últimos reportes<\u002Fdiv>\n  <div id=\"lista-ciu\"><\u002Fdiv>\n\n  <!-- BLOQUES DE CONFIANZA -->\n  <div class=\"confianza\" aria-label=\"Nuestro compromiso\">\n    <div class=\"conf-cel rojo\">\n      <div class=\"conf-ico\" data-ico=\"check\"><\u002Fdiv>\n      <div class=\"conf-tit\"><em>Compromiso<\u002Fem>Respondemos cada reporte<\u002Fdiv>\n      <p>Tu reporte llega al equipo de Obras Públicas en menos de 24 horas. Cero papeleo, cero filas.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"conf-cel azul\">\n      <div class=\"conf-ico\" data-ico=\"shield\"><\u002Fdiv>\n      <div class=\"conf-tit\"><em>Transparencia<\u002Fem>Trabajo a la vista de todos<\u002Fdiv>\n      <p>Todas las cuadrillas son públicas. Conoce dónde, cuándo y cómo trabaja tu municipio.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- FRASE DE CIERRE -->\n  <figure class=\"cierre\">\n    <div class=\"cierre-frase\">\n      <div class=\"cierre-frase-tit\">Cuidamos de la Gente<\u002Fdiv>\n      <div class=\"cierre-frase-sub\">Cada calle, cada barrio, cada riobambeño.<\u002Fdiv>\n    <\u002Fdiv>\n    <figcaption class=\"cierre-firma\">\n      <span class=\"cierre-firma-tx\">Cuidamos de la Gente · GADMR<\u002Fspan>\n    <\u002Ffigcaption>\n  <\u002Ffigure>\n<\u002Fmain>\n\n<!-- WIZARD -->\n<div class=\"wiz-full\" id=\"wiz\">\n  <div class=\"wiz-hdr\">\n    <span class=\"ico\" style=\"color:var(--rojo);font-size:1.2rem;\" data-ico-static=\"pin\"><\u002Fspan>\n    <h2 id=\"wiz-titulo\">Reportar bache<\u002Fh2>\n    <button class=\"wiz-close\" onclick=\"cerrarWiz()\" data-ico=\"close\" aria-label=\"Cerrar\"><\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"wiz-indicadores\">\n    <div class=\"wiz-ind\" id=\"wind-foto\">\n      <span class=\"wiz-ind-ico\" data-ico-static=\"camera\"><\u002Fspan>\n      <span class=\"wiz-ind-check\" data-ico-static=\"check\"><\u002Fspan>\n      <span class=\"wiz-ind-lbl\">Foto<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"wiz-ind\" id=\"wind-gps\">\n      <span class=\"wiz-ind-ico\" data-ico-static=\"pin\"><\u002Fspan>\n      <span class=\"wiz-ind-check\" data-ico-static=\"check\"><\u002Fspan>\n      <span class=\"wiz-ind-lbl\">GPS<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"wiz-ind\" id=\"wind-guardar\">\n      <span class=\"wiz-ind-ico\" data-ico-static=\"save\"><\u002Fspan>\n      <span class=\"wiz-ind-check\" data-ico-static=\"check\"><\u002Fspan>\n      <span class=\"wiz-ind-lbl\">Guardar<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"wiz-body\">\n    <div class=\"wiz-sec\">\n      <div class=\"wiz-sec-lbl\"><span class=\"ico\" data-ico-static=\"camera\"><\u002Fspan>Foto del bache<\u002Fdiv>\n      <div class=\"foto-tap\" id=\"foto-tap\" onclick=\"document.getElementById('wiz-foto-inp').click()\">\n        <div class=\"ft-ico\" data-ico-static=\"camera\"><\u002Fdiv>\n        <h3 id=\"ft-title\">Toca para tomar la foto<\u002Fh3>\n        <p id=\"ft-sub\">Apunta la cámara al bache<\u002Fp>\n        <img class=\"foto-prev-big\" id=\"wiz-foto-prev\" alt=\"\">\n      <\u002Fdiv>\n      <button class=\"btn-refoto\" id=\"btn-refoto\" onclick=\"document.getElementById('wiz-foto-inp').click()\" data-ico=\"camera\">Cambiar foto<\u002Fbutton>\n      <input type=\"file\" id=\"wiz-foto-inp\" accept=\"image/*\" capture=\"environment\" style=\"display:none\" onchange=\"wiz_fotoTomada(this)\">\n    <\u002Fdiv>\n\n    <div class=\"wiz-sec\">\n      <div class=\"wiz-sec-lbl\"><span class=\"ico\" data-ico-static=\"pin\"><\u002Fspan>Ubicación GPS<\u002Fdiv>\n      <button class=\"gps-btn-big\" id=\"btn-gps\" onclick=\"wiz_obtenerGPS()\" data-ico=\"pin\">Obtener GPS<\u002Fbutton>\n      <div class=\"gps-result\" id=\"gps-result\">Presiona para obtener coordenadas<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"wiz-sec\">\n      <div class=\"wiz-sec-lbl\"><span class=\"ico\" data-ico-static=\"hole\"><\u002Fspan>Tipo de bache<\u002Fdiv>\n      <div class=\"tipo-grid\" id=\"tipo-grid\">\n        <button class=\"tipo-btn\" onclick=\"selTipo(this,'Grande')\">Grande<\u002Fbutton>\n        <button class=\"tipo-btn\" onclick=\"selTipo(this,'Mediano')\">Mediano<\u002Fbutton>\n        <button class=\"tipo-btn\" onclick=\"selTipo(this,'Pequeño')\">Pequeño<\u002Fbutton>\n        <button class=\"tipo-btn\" onclick=\"selTipo(this,'Profundo')\">Profundo<\u002Fbutton>\n        <button class=\"tipo-btn\" onclick=\"selTipo(this,'Superficial')\">Superficial<\u002Fbutton>\n      <\u002Fdiv>\n      <input type=\"hidden\" id=\"wiz-tipo\">\n    <\u002Fdiv>\n\n    <div id=\"wiz-aten-extra\" style=\"display:none;\">\n      <div class=\"wiz-sec\">\n        <div class=\"wiz-sec-lbl\"><span class=\"ico\" data-ico-static=\"image\"><\u002Fspan>Foto DESPUÉS (obligatoria)<\u002Fdiv>\n        <div class=\"foto-area\" onclick=\"document.getElementById('wiz-desp-inp').click()\">\n          <div class=\"fi\" data-ico-static=\"camera\"><\u002Fdiv>\n          <p>Foto del estado reparado<\u002Fp>\n          <img class=\"fp\" id=\"wiz-desp-prev\" alt=\"\">\n        <\u002Fdiv>\n        <input type=\"file\" id=\"wiz-desp-inp\" accept=\"image/*\" capture=\"environment\" style=\"display:none\" onchange=\"wiz_fotoDesp(this)\">\n      <\u002Fdiv>\n      <div class=\"wiz-sec\">\n        <div class=\"wiz-sec-lbl\"><span class=\"ico\" data-ico-static=\"edit\"><\u002Fspan>Observaciones<\u002Fdiv>\n        <textarea id=\"wiz-obs\" placeholder=\"Materiales usados, estado final…\" oninput=\"wiz_checkEnviar()\"><\u002Ftextarea>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <button class=\"btn-enviar\" id=\"btn-enviar\" onclick=\"wiz_enviar()\">Guardar reporte<\u002Fbutton>\n    <div class=\"wiz-hint\" id=\"wiz-hint\">Toma la foto y obtén el GPS para habilitar<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- LOGIN -->\n<div class=\"ov\" id=\"ov-login\">\n  <div class=\"modal\" style=\"max-width:380px;\">\n    <div class=\"modal-hdr\"><h3>Acceso técnico<\u002Fh3><button class=\"m-close\" onclick=\"co('ov-login')\" data-ico=\"close\"><\u002Fbutton><\u002Fdiv>\n    <div class=\"modal-body\">\n      <p style=\"font-size:0.8rem;color:var(--tx-m);margin-bottom:16px;line-height:1.45;\">GADM Riobamba · Dirección de Obras Públicas<\u002Fp>\n      <div class=\"campo\"><label>Usuario<\u002Flabel><input type=\"text\" id=\"l-usr\" autocomplete=\"username\" onkeydown=\"if(event.key==='Enter')document.getElementById('l-clave').focus()\"><\u002Fdiv>\n      <div class=\"campo\"><label>Contraseña<\u002Flabel><input type=\"password\" id=\"l-clave\" autocomplete=\"current-password\" onkeydown=\"if(event.key==='Enter')intentarLogin()\"><\u002Fdiv>\n      <div class=\"err\" id=\"l-err\">Usuario o contraseña incorrectos<\u002Fdiv>\n      <button class=\"btn b-azul mt\" onclick=\"intentarLogin()\">Ingresar<\u002Fbutton>\n      <div class=\"divider\"><\u002Fdiv>\n      <button class=\"btn b-gris\" onclick=\"abrirRec()\" style=\"font-size:0.8rem;\">¿Olvidaste tu contraseña?<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- RECUPERACIÓN -->\n<div class=\"ov\" id=\"ov-rec\">\n  <div class=\"modal\" style=\"max-width:380px;\">\n    <div class=\"modal-hdr\"><h3>Recuperar acceso<\u002Fh3><button class=\"m-close\" onclick=\"co('ov-rec');ao('ov-login')\" data-ico=\"close\"><\u002Fbutton><\u002Fdiv>\n    <div class=\"modal-body\">\n      <div class=\"campo\"><label>Usuario<\u002Flabel><input type=\"text\" id=\"rec-usr\"><\u002Fdiv>\n      <div class=\"campo\" id=\"rec-preg-c\" style=\"display:none;\"><label id=\"rec-preg-lbl\">Pregunta<\u002Flabel><input type=\"text\" id=\"rec-resp\"><\u002Fdiv>\n      <div class=\"campo\" id=\"rec-nc-c\" style=\"display:none;\"><label>Nueva contraseña<\u002Flabel><input type=\"password\" id=\"rec-nc\"><\u002Fdiv>\n      <div class=\"err\" id=\"rec-err\">Datos incorrectos<\u002Fdiv>\n      <button class=\"btn b-azul mt\" id=\"rec-btn\" onclick=\"pasoRec()\">Buscar usuario<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- CAMBIO CLAVE -->\n<div class=\"ov\" id=\"ov-cc\">\n  <div class=\"modal\" style=\"max-width:400px;\">\n    <div class=\"modal-hdr\"><h3>Configurar contraseña<\u002Fh3><\u002Fdiv>\n    <div class=\"modal-body\">\n      <p style=\"font-size:0.82rem;color:var(--tx-m);margin-bottom:16px;line-height:1.45;\">Primer ingreso — establece una contraseña y tu pregunta de seguridad.<\u002Fp>\n      <div class=\"campo\"><label>Nueva contraseña<\u002Flabel><input type=\"password\" id=\"cc-nv\"><\u002Fdiv>\n      <div class=\"campo\"><label>Confirmar contraseña<\u002Flabel><input type=\"password\" id=\"cc-cf\"><\u002Fdiv>\n      <div class=\"campo\"><label>Pregunta de seguridad<\u002Flabel>\n        <select id=\"cc-preg\">\n          <option value=\"\">Elige una pregunta…<\u002Foption>\n          <option>¿Nombre de tu primera mascota?<\u002Foption>\n          <option>¿Ciudad en que naciste?<\u002Foption>\n          <option>¿Nombre de tu escuela primaria?<\u002Foption>\n          <option>¿Tu película favorita?<\u002Foption>\n          <option>¿Segundo nombre de tu madre?<\u002Foption>\n        <\u002Fselect>\n      <\u002Fdiv>\n      <div class=\"campo\"><label>Respuesta<\u002Flabel><input type=\"text\" id=\"cc-resp\"><\u002Fdiv>\n      <div class=\"err\" id=\"cc-err\">Completa todos los campos<\u002Fdiv>\n      <button class=\"btn b-azul mt\" onclick=\"guardarCC()\">Guardar y continuar<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- DETALLE -->\n<div class=\"ov\" id=\"ov-det\">\n  <div class=\"modal\">\n    <div class=\"modal-hdr\"><h3 id=\"det-tit\">Detalle<\u002Fh3><button class=\"m-close\" onclick=\"co('ov-det')\" data-ico=\"close\"><\u002Fbutton><\u002Fdiv>\n    <div class=\"modal-body\" id=\"det-body\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- CRONOGRAMA MODAL -->\n<div class=\"ov\" id=\"ov-cron\">\n  <div class=\"modal\" style=\"max-width:420p ss=\"btn b-rojo\" onclick=\"confirmarReset()\">Confirmar reseteo<\u002Fbutton>\n      <div class=\"divider\"><\u002Fdiv>\n      <button class=\"btn b-gris\" onclick=\"co('ov-reset')\">Cancelar<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- PANEL TÉCNICO -->\n<div class=\"panel\" id=\"panel\">\n  <div class=\"p-hdr\">\n    <h2>\n      <img class=\"logo-mark\" src=\"10f151b8-dbbc-463d-ad8e-7a228f440bad\" alt=\"\" style=\"width:38px;height:38px;border-radius:8px;background:#fff;padding:2px;\">\n      Panel Técnico\n    <\u002Fh2>\n    <div style=\"display:flex;align-items:center;gap:9px;\">\n      <div class=\"usr-chip\"><span class=\"ico\" data-ico-static=\"user\"><\u002Fspan><span id=\"p-usr\">—<\u002Fspan><\u002Fdiv>\n      <span id=\"p-timer\" style=\"font-size:0.68rem;opacity:0.5;font-weight:600;\"><\u002Fspan>\n      <button class=\"btn-salir\" onclick=\"cerrarSes()\">Salir<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"tabs\" id=\"tabs\">\n    <button class=\"tab on\" onclick=\"actTab('tc-pen')\" id=\"tb-tc-pen\"><span class=\"ico\" data-ico-static=\"hole\"><\u002Fspan>Pendientes <span class=\"tab-bdg\" id=\"bdg-pen\">0<\u002Fspan><\u002Fbutton>\n    <button class=\"tab\" onclick=\"actTab('tc-ate')\" id=\"tb-tc-ate\"><span class=\"ico\" data-ico-static=\"check\"><\u002Fspan>Atendidos<\u002Fbutton>\n    <button class=\"tab\" onclick=\"actTab('tc-rep')\" id=\"tb-tc-rep\"><span class=\"ico\" data-ico-static=\"plus\"><\u002Fspan>Nuevo reporte<\u002Fbutton>\n    <button class=\"tab\" onclick=\"actTab('tc-mapa')\" id=\"tb-tc-mapa\"><span class=\"ico\" data-ico-static=\"map\"><\u002Fspan>Mapa<\u002Fbutton>\n    <button class=\"tab\" onclick=\"actTab('tc-cron')\" id=\"tb-tc-cron\"><span class=\"ico\" data-ico-static=\"cal\"><\u002Fspan>Cronograma<\u002Fbutton>\n    <button class=\"tab\" id=\"tb-tc-adm\" onclick=\"actTab('tc-adm')\" style=\"display:none;\"><span class=\"ico\" data-ico-static=\"shield\"><\u002Fspan>Admin<\u002Fbutton>\n  <\u002Fdiv>\n\n  <div class=\"tc on\" id=\"tc-pen\"><div id=\"lista-pen\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"tc\" id=\"tc-ate\"><div id=\"lista-ate\"><\u002Fdiv><\u002Fdiv>\n\n  <div class=\"tc\" id=\"tc-rep\">\n    <div style=\"max-width:420px;margin:0 auto;text-align:center;padding-top:30px;\">\n      <div style=\"width:64px;height:64px;border-radius:18px;background:var(--rojo-s);color:var(--rojo);display:inline-flex;align-items:center;justify-content:center;font-size:1.9rem;margin-bottom:16px;\" data-ico-static=\"pin\"><\u002Fdiv>\n      <h3 style=\"font-size:1.15rem;font-weight:700;color:var(--azul);margin-bottom:8px;\">Nuevo reporte<\u002Fh3>\n      <p style=\"color:var(--tx-m);font-size:0.88rem;margin-bottom:22px;line-height:1.5;\">Registra un nuevo reporte desde tu ubicación actual usando el flujo guiado.<\u002Fp>\n      <button class=\"btn b-rojo\" onclick=\"abrirWizard('tecnico')\" data-ico=\"plus\" style=\"max-width:280px;margin:0 auto;\">Nuevo reporte de bache<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tc\" id=\"tc-mapa\"><div id=\"mapa-tec\"><\u002Fdiv><\u002Fdiv>\n\n  <div class=\"tc\" id=\"tc-cron\">\n    <div style=\"max-width:640px;\">\n      <button class=\"btn b-azul mb\" style=\"max-width:240px;\" onclick=\"ao('ov-cron')\" data-ico=\"plus\">Programar intervención<\u002Fbutton>\n      <div id=\"lista-cron-tec\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tc\" id=\"tc-adm\">\n    <div style=\"max-width:640px;\">\n      <div class=\"adm-sec\">\n        <h3><span class=\"ico\" data-ico-static=\"link\"><\u002Fspan>Conexión GitHub<\u002Fh3>\n        <div class=\"sync-bar\">\n          <div style=\"display:flex;align-items:center;gap:8px;\"><div class=\"sdot\" id=\"gh-dot\"><\u002Fdiv><span id=\"gh-st\">Sin token configurado<\u002Fspan><\u002Fdiv>\n          <button class=\"btn btn-sm\" style=\"background:rgba(255,255,255,0.14);color:#fff;border:1px solid rgba(255,255,255,0.22);\" onclick=\"ao('ov-token')\" data-ico=\"cog\">Configurar<\u002Fbutton>\n        <\u002Fdiv>\n        <button class=\"btn b-verde mb\" onclick=\"sincGH()\" data-ico=\"cloud\">Sincronizar con GitHub<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"adm-sec\">\n        <h3><span class=\"ico\" data-ico-static=\"user\"><\u002Fspan>Usuarios<\u002Fh3>\n        <div id=\"lista-usr\"><\u002Fdiv>\n        <button class=\"btn b-azul mt\" style=\"max-width:220px;\" onclick=\"ao('ov-usr')\" data-ico=\"plus\">Agregar usuario<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"adm-sec\">\n        <h3><span class=\"ico\" data-ico-static=\"chart\"><\u002Fspan>Estadísticas<\u002Fh3>\n        <div id=\"adm-stats\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script src=\"85546500-e4f1-48e4-b882-4fd2ccb19f18\"><\u002Fscript>\n<script>\n// Inyectar iconos estáticos (data-ico-static) — los dinámicos data-ico se manejan en app.js DOMContentLoaded\ndocument.addEventListener('DOMContentLoaded',()=>{\n  document.querySelectorAll('[data-ico-static]').forEach(el=>{\n    const n=el.getAttribute('data-ico-static');\n    if(typeof ICON!=='undefined'&&ICON[n])el.innerHTML=ICON[n];\n  });\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
